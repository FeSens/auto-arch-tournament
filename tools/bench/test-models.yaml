# Test models for end-to-end harness validation.
# Used by `python -m tools.bench.runner --models tools/bench/test-models.yaml`.
# Names are compact so --only filtering is easy.

models:
  - name: deepseek-v4-pro
    pi_model: openrouter/deepseek/deepseek-v4-pro
    key_env: OPENROUTER_API_KEY
  - name: hy3-free
    pi_model: openrouter/tencent/hy3-preview:free
    key_env: OPENROUTER_API_KEY
  - name: nemotron-omni-free
    pi_model: openrouter/nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
    key_env: OPENROUTER_API_KEY
  - name: ling-2-6t-free
    pi_model: openrouter/inclusionai/ling-2.6-1t:free
    key_env: OPENROUTER_API_KEY
  - name: minimax-m25-free
    pi_model: openrouter/minimax/minimax-m2.5:free
    key_env: OPENROUTER_API_KEY
  - name: gpt-oss-120b-free
    pi_model: openrouter/openai/gpt-oss-120b:free
    key_env: OPENROUTER_API_KEY
  - name: glm-45-air-free
    pi_model: openrouter/z-ai/glm-4.5-air:free
    key_env: OPENROUTER_API_KEY
