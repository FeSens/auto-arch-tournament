# Codex CLI reference benchmark — same models the user runs in the
# main-branch tournament. Used as the "known good" baseline against
# which pi/opencode runs are compared.
#
# Auth: `codex login` (ChatGPT subscription, OAuth). Already configured.
# Workflow: codex-cli is purpose-built and self-checks via shell tool —
# no autofix loop needed.

models:
  - name: gpt-5_5
    pi_model: gpt-5.5
    provider: codex
    oauth: true
  - name: gpt-5_4
    pi_model: gpt-5.4
    provider: codex
    oauth: true
  - name: gpt-5_3-codex
    pi_model: gpt-5.3-codex
    provider: codex
    oauth: true
