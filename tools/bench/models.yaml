# LLM benchmark frontier model registry.
#
# Each entry maps a short benchmark `name` (used in result paths and
# leaderboard rows) to a runtime+model invocation:
#   - `provider`: which CLI to drive — codex / opencode / claude.
#   - `model`: the runtime-specific model identifier.
#   - `oauth: true` for subscription auth (~/.codex/auth.json,
#     ~/.local/share/opencode/auth.json) — leave key_env empty.
#   - `key_env: <NAME>` for paid-API access — points at an env var
#     whose value is the API key. Place keys in ~/.bench-keys.env
#     (gitignored), one VAR=value per line. Native provider keys
#     (Anthropic, OpenAI, Google, xAI) avoid OpenRouter's 5-10% markup;
#     OpenRouter is used for everything else.
#
# The runner enumerates this list × J reps to build the matrix.
# Override the file with --models or filter with --only.

models:
  # Frontier — native provider keys (Anthropic, OpenAI, Google, xAI)
  - name: opus-47
    provider: opencode
    model: anthropic/claude-opus-4-7
    key_env: ANTHROPIC_API_KEY
  - name: sonnet-46
    provider: opencode
    model: anthropic/claude-sonnet-4-6
    key_env: ANTHROPIC_API_KEY
  - name: gpt-5
    provider: opencode
    model: openai/gpt-5
    key_env: OPENAI_API_KEY
  - name: gpt-5-mini
    provider: opencode
    model: openai/gpt-5-mini
    key_env: OPENAI_API_KEY
  - name: gemini-3-pro
    provider: opencode
    model: google/gemini-3-pro
    key_env: GOOGLE_API_KEY
  - name: grok-5
    provider: opencode
    model: xai/grok-5
    key_env: XAI_API_KEY

  # Chinese frontier — OpenRouter
  - name: qwen3-coder
    provider: opencode
    model: openrouter/qwen/qwen3-coder
    key_env: OPENROUTER_API_KEY
  - name: deepseek-v4
    provider: opencode
    model: openrouter/deepseek/deepseek-v4
    key_env: OPENROUTER_API_KEY
  - name: kimi-k2
    provider: opencode
    model: openrouter/moonshotai/kimi-k2
    key_env: OPENROUTER_API_KEY
  - name: glm-4-6
    provider: opencode
    model: openrouter/zhipu/glm-4-6
    key_env: OPENROUTER_API_KEY
  - name: minimax-m2
    provider: opencode
    model: openrouter/minimax/m2
    key_env: OPENROUTER_API_KEY
