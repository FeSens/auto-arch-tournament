# Lite-variant config — fast smoke run for the bench fixture.
# Target: <2h wall-clock, <$10 USD, 1 model, N=5 rounds, 1 P&R seed.
#
# Used by reviewers for executability verification, NOT for fitness comparison
# (1 P&R seed is insufficient for a defensible fitness median; full matrix
# uses 3 seeds).
#
# Invocation (assuming runner.py supports --config; a parallel agent (Task 16)
# is adding that flag):
#
#   python -m tools.bench.runner --config tools/bench/lite.yaml
#
# Until --config is wired, run the same effect with:
#
#   python -m tools.bench.runner --reps 1 --models gpt-5-mini --n 5

N: 5
K: 1
reps: 1
seeds_per_pnr: 1
models:
  - name: gpt-5-mini
    pi_model: openai/gpt-5-mini
    key_env: OPENAI_API_KEY
