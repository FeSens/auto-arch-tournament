# Final E2E test set: small, focused, mix of free + premium.
# - deepseek-v4-pro (premium, paid; previously crashed Parasail backend)
# - gpt-5.1-codex-max (premium coding model)
# - hy3-free (cheapest free; quick failure-mode signal)
models:
  - name: deepseek-v4-pro
    pi_model: openrouter/deepseek/deepseek-v4-pro
    key_env: OPENROUTER_API_KEY
  - name: gpt-5-1-codex-max
    pi_model: openrouter/openai/gpt-5.1-codex-max
    key_env: OPENROUTER_API_KEY
  - name: hy3-free
    pi_model: openrouter/tencent/hy3-preview:free
    key_env: OPENROUTER_API_KEY
