# Round 2 test models (smaller focused set):
# - gpt-5.5 (literal user request — does not exist on OpenRouter as of
#   2026-04-30; expected to fail at the API level. Validates the
#   harness's "model not available" failure path.)
# - gpt-5.1-codex-max (closest existing coding-focused premium variant)
# - deepseek-v4-pro (retry — first run failed with an upstream Parasail
#   backend crash, not a model issue)
models:
  - name: gpt-5_5
    pi_model: openrouter/openai/gpt-5.5
    key_env: OPENROUTER_API_KEY
  - name: gpt-5-1-codex-max
    pi_model: openrouter/openai/gpt-5.1-codex-max
    key_env: OPENROUTER_API_KEY
  - name: deepseek-v4-pro-retry
    pi_model: openrouter/deepseek/deepseek-v4-pro
    key_env: OPENROUTER_API_KEY
