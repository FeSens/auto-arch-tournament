# OpenAI Codex subscription models, 5.3 and beyond.
# These all reached the formal phase in the K=1 baseline run, so they're
# candidates for K=3 where each round generates 3 diverse hypotheses
# (micro_opt / structural / predictor) and picks the best.
#
# 5.1 / 5.1-codex-* / 5.2-codex are excluded — pi reported "model is not
# supported when using Codex with a ChatGPT account" for those.

models:
  - name: gpt-5_5
    pi_model: openai-codex/gpt-5.5
    oauth: true
  - name: gpt-5_4
    pi_model: openai-codex/gpt-5.4
    oauth: true
  - name: gpt-5_4-mini
    pi_model: openai-codex/gpt-5.4-mini
    oauth: true
  - name: gpt-5_3-codex
    pi_model: openai-codex/gpt-5.3-codex
    oauth: true
  - name: gpt-5_3-codex-spark
    pi_model: openai-codex/gpt-5.3-codex-spark
    oauth: true
