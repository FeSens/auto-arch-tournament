# NeurIPS pilot run — gpt-5.4-mini + kimi-k2.6 batch.
#
# Prior pilot rows in bench/pilot/results.jsonl (skipped on retry):
#   - gpt-5.5 ×3        (+50.89% / +50.85% / +28.96%)
#   - opus-4.7 rep1/2/3 (failed+30 / done+38 / done+29)
#
# gemini-3.1-pro dropped from this YAML — at variant=high it dies at
# 964s (Bun runtime cap); at variant=xhigh it survives but fails
# 100% of slots at hypothesis-gen / sandbox stage.
#
# Variant rule: OpenRouter routes use xhigh per user directive;
# OpenAI-direct also xhigh; opencode-go (kimi) uses high (it's not
# routed via OpenRouter).

models:
  - name: opus-4_7
    provider: opencode
    model: openrouter/anthropic/claude-opus-4.7
    variant: xhigh
    oauth: true
  - name: gpt-5_4-mini
    provider: opencode
    model: openai/gpt-5.4-mini
    variant: xhigh
    oauth: true
  - name: kimi-k2_6
    provider: opencode
    model: opencode-go/kimi-k2.6
    variant: high
    oauth: true
  - name: gpt-5_5
    provider: opencode
    model: openai/gpt-5.5
    variant: xhigh
    oauth: true
