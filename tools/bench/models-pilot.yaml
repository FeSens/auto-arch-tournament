# NeurIPS pilot run — gemini-3.1-pro + kimi-k2.6 batch.
#
# Prior pilot rows in bench/pilot/results.jsonl (skipped by
# load_done_set on retry — kept in this YAML so the leaderboard
# layout still includes them):
#   - gpt-5.5 ×3        (+50.89% / +50.85% / +28.96%, OpenAI/OAuth)
#   - opus-4.7-rep1     (failed +30.17%, killed by cross-rep pkill at iter 7)
#   - opus-4.7-rep2     (done +38.04%)
#   - opus-4.7-rep3     (done +28.88%)
#
# This run will execute:
#   - gemini-3.1-pro ×3 (OpenRouter, variant=high)
#   - kimi-k2.6 ×3      (opencode-go aka Zen-Go, variant=high)
#
# `variant:` plumbs through to OPENCODE_VARIANT (or
# CODEX_REASONING_EFFORT for codex provider). xhigh is OpenAI-only;
# Anthropic/Google/Moonshot routes accept low/medium/high.

models:
  - name: opus-4_7
    provider: opencode
    model: openrouter/anthropic/claude-opus-4.7
    variant: high
    oauth: true
  - name: gemini-3_1-pro
    provider: opencode
    model: openrouter/google/gemini-3.1-pro-preview
    variant: high
    oauth: true
  - name: kimi-k2_6
    provider: opencode
    model: opencode-go/kimi-k2.6
    variant: high
    oauth: true
  - name: gpt-5_5
    provider: opencode
    model: openai/gpt-5.5
    variant: xhigh
    oauth: true
