# NeurIPS pilot run — 4 opencode-routed models.
#
# A focused subset of the full models.yaml for the first paper-grade
# bench run. Mix of OpenAI subscription (gpt-5.5) and opencode/
# opencode-go free-tier hosted models (hy3-preview, minimax, kimi)
# so the fitness floor/ceiling spread is visible before scaling to
# the full frontier matrix.
#
# All four are routed through opencode (uniform tool-surface
# comparison). Auth: opencode's own credentials store at
# ~/.local/share/opencode/auth.json — `opencode auth list` should
# show OpenAI (oauth) for gpt-5.5; the opencode/* and opencode-go/*
# routes piggyback on the same opencode session.

models:
  - name: gpt-5_5
    provider: opencode
    model: openai/gpt-5.5
    oauth: true
  - name: hy3-preview-free
    provider: opencode
    model: opencode/hy3-preview-free
    oauth: true
  - name: minimax-m2_7
    provider: opencode
    model: opencode-go/minimax-m2.7
    oauth: true
  - name: kimi-k2_6
    provider: opencode
    model: opencode-go/kimi-k2.6
    oauth: true
