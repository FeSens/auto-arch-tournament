# NeurIPS pilot run — gemini-3.1-pro retry + kimi-k2.6 batch.
#
# Prior pilot rows in bench/pilot/results.jsonl (skipped on retry):
#   - gpt-5.5 ×3        (+50.89% / +50.85% / +28.96%)
#   - opus-4.7 rep1/2/3 (failed+30 / done+38 / done+29)
#
# Per user directive: every OpenRouter-routed entry uses variant=xhigh.
# (kimi-k2.6 is on opencode-go, not OpenRouter — variant=high.)
# (gpt-5.5 is OpenAI direct, not OpenRouter — variant=xhigh per the
#  pre-registered methodology.)
#
# Note on the previous gemini failures (v12):
# Bun runtime caps fetch idleTimeout at 960s; both gemini-rep1 and
# gemini-rep2 died at exactly 964s with "make: *** [loop] Terminated:
# 15". This is unrelated to variant choice — it's a streaming-idle
# limit. Retrying with xhigh as requested; if same 964s death pattern
# appears, gemini-3.1-pro is not viable on this opencode build.

models:
  - name: opus-4_7
    provider: opencode
    model: openrouter/anthropic/claude-opus-4.7
    variant: xhigh
    oauth: true
  - name: gemini-3_1-pro
    provider: opencode
    model: openrouter/google/gemini-3.1-pro-preview
    variant: xhigh
    oauth: true
  - name: kimi-k2_6
    provider: opencode
    model: opencode-go/kimi-k2.6
    variant: high
    oauth: true
  - name: gpt-5_5
    provider: opencode
    model: openai/gpt-5.5
    variant: xhigh
    oauth: true
