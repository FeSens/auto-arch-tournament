# NeurIPS pilot run — 4 opencode models.
#
# A focused subset of the full models.yaml for the first paper-grade
# bench run. Mix of premium (gpt-5.5, deepseek-v4-pro) and free-tier
# (hy3-preview:free, ling-2.6-1t:free) so we get a sense of the
# fitness floor / ceiling spread before committing to the full
# 11-model J=3 matrix.
#
# All routed via opencode for uniform tool-surface comparison.
# gpt-5.5 uses opencode's OAuth (ChatGPT subscription).
# OpenRouter entries need OPENROUTER_API_KEY in ~/.bench-keys.env.

models:
  - name: gpt-5_5
    provider: opencode
    model: openai/gpt-5.5
    oauth: true
  - name: hy3-free
    provider: opencode
    model: openrouter/tencent/hy3-preview:free
    key_env: OPENROUTER_API_KEY
  - name: deepseek-v4-pro
    provider: opencode
    model: openrouter/deepseek/deepseek-v4-pro
    key_env: OPENROUTER_API_KEY
  - name: ling-2-6-1t-free
    provider: opencode
    model: openrouter/inclusionai/ling-2.6-1t:free
    key_env: OPENROUTER_API_KEY
