[options]
isa rv32im
nret 1
solver bitwuzla

[depth]
# BMC depth per check. 2nd column (where present) is the k-induction prove
# depth. Keep depths matched to the current pipeline so bugs within ~20
# cycles of any symbolic instruction stream are exposed.
insn          20
reg       10  20
pc_fwd    10  20
pc_bwd    10  20
causal    10  20
# unique   — no two retirements share rvfi_order (catches double-retire)
# cover    — sanity that the CPU retires (prevents vacuous-pass suites)
# ill      — illegal instructions must trap; rvfi_trap from decoder.is_illegal
# liveness — CPU makes forward progress under any symbolic stream
unique     1 10 20
cover      1    20
ill             20
liveness   1 10 20

[defines]
`define RISCV_FORMAL_ALIGNED_MEM
# RISCV_FORMAL_ALTOPS substitutes the M-extension mul/div/rem operations
# with simpler-but-non-trivial algebra so bitwuzla solves them inside the
# 20-step BMC budget. Without ALTOPS the SMT problem on 32-bit signed
# division is intractable (15+ minutes per check).
`define RISCV_FORMAL_ALTOPS

[cover]
# Sanity cover: the CPU must retire at least one non-trapping instruction.
# A vacuous suite (nothing ever retires) would fail this — no symbolic
# trace can make rvfi_valid && !rvfi_trap go true.
always @* if (!reset) cover (rvfi_valid && !rvfi_trap);

