[options]
isa rv32im
nret 2
solver bitwuzla

[depth]
# BMC depth per check. 2nd column (where present) is the k-induction prove
# depth. Keep depths matched to the current pipeline so bugs within ~20
# cycles of any symbolic instruction stream are exposed.
insn          20
reg       10  20
pc_fwd    10  20
pc_bwd    10  20
causal    10  20
# unique   — no two retirements share rvfi_order (catches double-retire)
# cover    — sanity that the CPU retires (prevents vacuous-pass suites)
# ill      — illegal instructions must trap; rvfi_trap from decoder.is_illegal
# liveness — CPU makes forward progress under any symbolic stream
unique     1 10 20
cover      1    20
ill             20
liveness   1 10 20

[defines]
`define RISCV_FORMAL_ALIGNED_MEM
# RISCV_FORMAL_ALTOPS — fast mode. Substitutes M-ext mul/div/rem with
# simpler XOR-of-add/sub formulas so bitwuzla solves them inside the
# 20-step BMC budget (rvfi.rst §7.6 "Alternative arithmetic operations").
#
# IMPORTANT — what this DOES and DOES NOT prove:
#   ✓ proves: M-ext bypassing, operand routing (rs1/rs2 -> unit -> rd),
#             stall/forwarding behavior on mul/div, all I-base arithmetic
#             and trap discipline.
#   ✗ does NOT prove: the actual MUL/DIV/REM arithmetic is correct.
#     The DUT and the spec both implement the same XOR substitute under
#     this define, so a wrong real multiplier can still pass formal here.
#
# M-extension arithmetic correctness is covered separately by:
#   1. test/test_alu.py — 30+ vectors per M-ext op, exact bit results.
#   2. cosim against test/cosim/reference.py — every retired MUL/DIV/REM
#      diff'd field-by-field.
#   3. `make formal-deep` — same checks without ALTOPS. SLOW (~hours per
#      M-ext check) but proves real arithmetic. Run periodically, not in
#      the per-iteration orchestrator loop.
`define RISCV_FORMAL_ALTOPS

[cover]
# Sanity cover: the CPU must retire at least one non-trapping instruction.
# A vacuous suite (nothing ever retires) would fail this — no symbolic
# trace can make rvfi_valid && !rvfi_trap go true.
always @* if (!reset) cover (rvfi_valid && !rvfi_trap);

